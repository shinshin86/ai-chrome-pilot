<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 340px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 13px;
        padding: 12px;
        margin: 0;
        color: #333;
      }
      h3 {
        margin: 0 0 10px;
        font-size: 14px;
      }
      .section {
        margin-bottom: 14px;
        padding-bottom: 12px;
        border-bottom: 1px solid #eee;
      }
      .section:last-child {
        border-bottom: none;
        margin-bottom: 0;
      }
      label {
        display: block;
        margin-bottom: 4px;
        font-weight: 500;
        font-size: 12px;
        color: #666;
      }
      input[type='text'] {
        width: 100%;
        padding: 6px 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 13px;
        box-sizing: border-box;
        margin-bottom: 8px;
      }
      button {
        padding: 6px 14px;
        border: none;
        border-radius: 4px;
        font-size: 13px;
        cursor: pointer;
        margin-right: 6px;
      }
      .btn-primary {
        background: #4285f4;
        color: #fff;
      }
      .btn-primary:hover {
        background: #3367d6;
      }
      .btn-danger {
        background: #ea4335;
        color: #fff;
      }
      .btn-danger:hover {
        background: #c5221f;
      }
      .btn-secondary {
        background: #f1f3f4;
        color: #333;
      }
      .btn-secondary:hover {
        background: #e0e0e0;
      }
      .status {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 11px;
        font-weight: 600;
      }
      .status.connected {
        background: #e6f4ea;
        color: #137333;
      }
      .status.disconnected {
        background: #fce8e6;
        color: #c5221f;
      }
      .tab-list {
        max-height: 200px;
        overflow-y: auto;
      }
      .tab-item {
        display: flex;
        align-items: center;
        padding: 6px 8px;
        border-radius: 4px;
        cursor: pointer;
        gap: 8px;
      }
      .tab-item:hover {
        background: #f1f3f4;
      }
      .tab-item.attached {
        background: #e8f0fe;
      }
      .tab-item img {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }
      .tab-title {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
      }
      #error {
        color: #c5221f;
        font-size: 12px;
        margin-top: 6px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="section">
      <h3>
        Connection
        <span id="statusBadge" class="status disconnected">Disconnected</span>
      </h3>
      <label for="serverUrl">Server URL</label>
      <input
        type="text"
        id="serverUrl"
        value="ws://127.0.0.1:3333/relay"
        placeholder="ws://127.0.0.1:3333/relay"
      />
      <label for="token">Auth Token</label>
      <input type="text" id="token" placeholder="(optional)" />
      <div>
        <button id="connectBtn" class="btn-primary">Connect</button>
        <button id="disconnectBtn" class="btn-danger" style="display: none">Disconnect</button>
      </div>
      <div id="error"></div>
    </div>

    <div class="section">
      <h3>Tabs</h3>
      <div id="tabList" class="tab-list">
        <div style="color: #999; font-size: 12px">Connect to server first</div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
